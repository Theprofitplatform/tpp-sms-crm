name: Code Quality

on:
  push:
    branches: [ main, develop, cleanup/* ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || echo "ESLint not fully configured yet"
        continue-on-error: true

      - name: Check for TODO/FIXME comments
        run: |
          echo "Checking for unresolved TODO/FIXME comments..."
          grep -rn "TODO\|FIXME" src/ tests/ --color=always || echo "No TODO/FIXME found"
        continue-on-error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Check for known vulnerabilities
        run: |
          npm audit --json > audit-results.json || true
          if [ -f audit-results.json ]; then
            echo "Audit results generated"
            cat audit-results.json | jq '.metadata'
          fi

      - name: Upload audit results
        uses: actions/upload-artifact@v3
        with:
          name: security-audit
          path: audit-results.json
        if: always()

  code-metrics:
    name: Code Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Count lines of code
        run: |
          echo "## Code Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Source Code" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find src -name "*.js" -type f -exec wc -l {} + | tail -1 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Code" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find tests -name "*.js" -type f -exec wc -l {} + | tail -1 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Count files
        run: |
          echo "### File Count" >> $GITHUB_STEP_SUMMARY
          echo "- Source files: $(find src -name '*.js' -type f | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Test files: $(find tests -name '*.js' -type f | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Total tracked files: $(git ls-files | wc -l)" >> $GITHUB_STEP_SUMMARY
