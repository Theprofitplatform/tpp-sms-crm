name: Lint

on:
  push:
    branches: [ main, cleanup/* ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint || echo "ESLint configuration pending"
      continue-on-error: true

    - name: Check for FIXME/TODO comments
      run: |
        echo "Checking for unresolved FIXME/TODO comments..."
        grep -r "FIXME\|TODO" src/ tests/ || echo "No FIXME/TODO found"
      continue-on-error: true
