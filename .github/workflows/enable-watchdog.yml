name: Enable Watchdog Monitor

on:
  workflow_dispatch:

jobs:
  enable-watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Enable Watchdog on VPS
        run: |
          ssh-keyscan -H 31.97.222.218 >> ~/.ssh/known_hosts

          ssh avi@31.97.222.218 << 'ENDSSH'
            echo "🔍 Current container status:"
            docker ps --filter "name=keyword-tracker" --format "table {{.Names}}\t{{.Status}}"

            echo ""
            echo "🚀 Enabling Cloudflare + Watchdog profiles..."
            cd /home/avi/seo-automation/current

            # Stop current containers
            docker compose -f docker-compose.prod.yml down

            # Start with both profiles enabled
            docker compose -f docker-compose.prod.yml --profile with-cloudflare --profile with-watchdog up -d

            echo ""
            echo "⏳ Waiting for containers to start..."
            sleep 20

            echo ""
            echo "✅ Final container status:"
            docker ps --filter "name=keyword-tracker" --format "table {{.Names}}\t{{.Status}}"

            echo ""
            echo "🔍 Checking watchdog logs:"
            docker logs keyword-tracker-watchdog --tail 10 2>&1 || echo "Watchdog starting up..."

            echo ""
            echo "🎯 Testing dashboard health:"
            curl -s https://seodashboard.theprofitplatform.com.au/api/v2/health | head -10
          ENDSSH
