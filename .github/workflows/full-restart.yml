name: Full Stack Restart

on:
  workflow_dispatch:

jobs:
  restart:
    name: Full Stack Restart
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 31.97.222.218 >> ~/.ssh/known_hosts

      - name: Full Stack Restart on VPS
        run: |
          ssh -o StrictHostKeyChecking=no avi@31.97.222.218 << 'ENDSSH'
            cd /home/avi/seo-automation/current

            echo "🛑 Stopping all containers..."
            docker compose -f docker-compose.prod.yml down

            echo "🧹 Removing old network..."
            docker network prune -f

            echo "🚀 Starting all containers with Cloudflare..."
            docker compose -f docker-compose.prod.yml --profile with-cloudflare up -d

            echo "⏳ Waiting for services to start..."
            sleep 20

            echo ""
            echo "📊 Container status:"
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "🌐 Network info:"
            docker network inspect current_keyword-network | grep -A 5 "Containers"

            echo ""
            echo "🔍 Cloudflared logs:"
            docker compose -f docker-compose.prod.yml logs cloudflared --tail 30

            echo ""
            echo "🏥 Testing dashboard internally..."
            sleep 5
            docker exec keyword-tracker-cloudflared wget -O- http://dashboard:9000/api/v2/health || echo "Dashboard test failed"

            echo ""
            echo "✨ Restart complete!"
          ENDSSH
