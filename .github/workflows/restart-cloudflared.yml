name: Restart Cloudflared

on:
  workflow_dispatch:

jobs:
  restart:
    name: Restart Cloudflared Container
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 31.97.222.218 >> ~/.ssh/known_hosts

      - name: Restart Cloudflared on VPS
        run: |
          ssh -o StrictHostKeyChecking=no avi@31.97.222.218 << 'ENDSSH'
            cd /home/avi/seo-automation/current

            echo "🔄 Restarting Cloudflared to pick up new configuration..."
            docker compose -f docker-compose.prod.yml restart cloudflared

            sleep 10

            echo "📊 Cloudflared status:"
            docker compose -f docker-compose.prod.yml ps cloudflared

            echo ""
            echo "🔍 Cloudflared logs:"
            docker compose -f docker-compose.prod.yml logs cloudflared --tail 50
          ENDSSH
