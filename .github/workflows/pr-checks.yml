name: Pull Request Checks

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

env:
  NODE_ENV: test

jobs:
  # Comprehensive testing
  tests:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: NODE_OPTIONS=--experimental-vm-modules npm test
        env:
          CI: true

      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-coverage
          path: coverage/
          retention-days: 7

  # Code quality checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: |
          if grep -q "\"lint\"" package.json; then
            npm run lint
          else
            echo "No lint script found, skipping..."
          fi
        continue-on-error: true

      - name: Check code formatting
        run: |
          if grep -q "\"format:check\"" package.json; then
            npm run format:check
          else
            echo "No format check script found, skipping..."
          fi
        continue-on-error: true

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for vulnerabilities
        run: npm audit --json > audit-results.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: audit-results.json
          retention-days: 7

  # Build verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [tests]

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: seo-automation:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm seo-automation:pr-${{ github.event.pull_request.number }} node --version
          echo "✅ Docker image builds successfully"

  # PR status summary
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [tests, code-quality, security, build]
    if: always()

    steps:
      - name: Generate PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
            });

            const tests = '${{ needs.tests.result }}';
            const quality = '${{ needs.code-quality.result }}';
            const security = '${{ needs.security.result }}';
            const build = '${{ needs.build.result }}';

            const status = (result) => {
              if (result === 'success') return '✅';
              if (result === 'failure') return '❌';
              return '⚠️';
            };

            const summary = `
            ## Pull Request Checks Summary

            | Check | Status |
            |-------|--------|
            | Tests | ${status(tests)} ${tests} |
            | Code Quality | ${status(quality)} ${quality} |
            | Security Audit | ${status(security)} ${security} |
            | Build | ${status(build)} ${build} |

            ### Deployment Preview
            - **Branch**: \`${context.payload.pull_request.head.ref}\`
            - **Target**: \`${context.payload.pull_request.base.ref}\`
            - **Commits**: ${context.payload.pull_request.commits}
            - **Files Changed**: ${context.payload.pull_request.changed_files}

            ${tests === 'success' && quality === 'success' && build === 'success'
              ? '✅ **Ready to merge!** All checks passed. Merging to main will trigger automatic deployment to production.'
              : '⚠️ **Not ready to merge.** Please fix failing checks before merging.'}

            ---
            **Note**: Merging this PR to \`main\` will automatically deploy to production (Docker VPS 31.97.222.218).
            `;

            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Check if ready to merge
        if: needs.tests.result != 'success' || needs.build.result != 'success'
        run: |
          echo "❌ PR checks failed. Not ready to merge."
          exit 1
