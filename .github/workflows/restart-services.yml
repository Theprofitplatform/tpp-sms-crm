name: Restart Services with Cloudflare

on:
  workflow_dispatch:  # Manual trigger only

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  restart:
    name: Restart All Services
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 31.97.222.218 >> ~/.ssh/known_hosts

      - name: Restart Services on VPS
        run: |
          ssh -o StrictHostKeyChecking=no avi@31.97.222.218 << 'ENDSSH'
            set -e

            echo "🔄 Restarting services with Cloudflare Tunnel..."
            cd /home/avi/seo-automation/current

            # Stop all containers
            echo "🛑 Stopping containers..."
            docker compose -f docker-compose.prod.yml down

            # Start all containers with Cloudflare profile
            echo "🚀 Starting all containers with Cloudflare Tunnel..."
            docker compose -f docker-compose.prod.yml --profile with-cloudflare up -d

            # Wait for services
            echo "⏳ Waiting for services to start..."
            sleep 15

            # Show status
            echo "📊 Container status:"
            docker compose -f docker-compose.prod.yml ps

            # Show Cloudflared logs
            echo ""
            echo "🔍 Cloudflared logs:"
            docker compose -f docker-compose.prod.yml logs cloudflared --tail 30

            # Test API
            echo ""
            echo "🏥 Testing API health..."
            sleep 5
            if curl -sf http://localhost:9000/api/v2/health > /dev/null 2>&1; then
              echo "✅ API is responding!"
              curl -s http://localhost:9000/api/v2/health | jq . 2>/dev/null || curl -s http://localhost:9000/api/v2/health
            else
              echo "⚠️  API not responding yet"
              docker compose -f docker-compose.prod.yml logs dashboard --tail 50
            fi

            echo ""
            echo "✨ Restart complete!"
          ENDSSH

      - name: Summary
        if: always()
        run: |
          echo "🎯 Services restarted with Cloudflare Tunnel"
          echo "📍 Public URL: https://seodashboard.theprofitplatform.com.au"
          echo "🏥 Health: https://seodashboard.theprofitplatform.com.au/api/v2/health"
