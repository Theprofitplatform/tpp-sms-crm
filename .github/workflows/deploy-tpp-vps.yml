name: Deploy to Production (PM2)

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

# This is the PRIMARY production deployment workflow
# Deploys to TPP VPS using PM2 process manager
# Target: https://seodashboard.theprofitplatform.com.au

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    # Tests must pass for deployment to proceed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint
        continue-on-error: true  # Allow warnings but log them

      - name: Run tests
        run: npm test
        env:
          CI: true
        # Tests must pass - deployment will be blocked if tests fail

  deploy:
    name: Deploy to TPP VPS
    runs-on: ubuntu-latest
    needs: test
    # Only run if the secret is configured and we're on main branch
    if: github.ref == 'refs/heads/main' && secrets.TPP_VPS_SSH_KEY != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TPP_VPS_SSH_KEY }}

      - name: Add TPP VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.TPP_VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to TPP VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.TPP_VPS_USER }}@${{ secrets.TPP_VPS_HOST }} << 'ENDSSH'
            set -e

            echo "🚀 Starting deployment to TPP VPS..."

            # Navigate to project directory
            cd ~/projects/seo-expert

            # Create backup of current state
            echo "📦 Creating backup..."
            BACKUP_DIR=~/backups/seo-expert
            mkdir -p $BACKUP_DIR
            BACKUP_FILE="$BACKUP_DIR/backup-$(date +%Y%m%d-%H%M%S).tar.gz"
            tar -czf $BACKUP_FILE \
              --exclude='node_modules' \
              --exclude='.git' \
              --exclude='*.log' \
              --exclude='database/*.db-*' \
              . 2>/dev/null || echo "Backup created with some warnings"

            # Keep only last 5 backups
            cd $BACKUP_DIR && ls -t backup-*.tar.gz | tail -n +6 | xargs -r rm

            # Return to project directory
            cd ~/projects/seo-expert

            # Stash any local changes
            echo "💾 Stashing local changes..."
            git stash --include-untracked || true

            # Pull latest code
            echo "⬇️  Pulling latest code from main..."
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies (ignore scripts to avoid husky issues)
            echo "📦 Installing dependencies..."
            npm ci --omit=dev --ignore-scripts

            # Build React dashboard
            echo "🎨 Building React dashboard..."
            cd dashboard
            npm ci
            npm run build
            cd ..

            # Backup database if exists
            if [ -f "database/seo-expert.db" ]; then
              echo "💾 Backing up database..."
              DB_BACKUP_DIR=~/backups/seo-expert/database
              mkdir -p $DB_BACKUP_DIR
              cp database/seo-expert.db "$DB_BACKUP_DIR/seo-expert-$(date +%Y%m%d-%H%M%S).db"

              # Keep only last 10 database backups
              cd $DB_BACKUP_DIR && ls -t seo-expert-*.db | tail -n +11 | xargs -r rm
              cd ~/projects/seo-expert
            fi

            # Check if PM2 process exists
            if pm2 list | grep -q "seo-expert"; then
              echo "🔄 Restarting PM2 process..."
              pm2 restart seo-expert
            else
              echo "🆕 Starting new PM2 process..."
              pm2 start dashboard-server.js --name seo-expert
              pm2 save
            fi

            # Wait for service to start
            echo "⏳ Waiting for service to start..."
            sleep 5

            # Health check
            echo "🏥 Running health check..."
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ Health check passed!"
            else
              echo "⚠️  Health endpoint not responding, checking if server is running..."
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "✅ Server is responding!"
              else
                echo "❌ Server health check failed!"
                pm2 logs seo-expert --lines 50 --nostream
                exit 1
              fi
            fi

            # Show process status
            echo "📊 Process status:"
            pm2 show seo-expert

            # Clean up old node_modules
            echo "🧹 Cleaning up..."
            npm prune --production

            echo "✨ Deployment completed successfully!"
            echo "📍 Service running at: http://localhost:3000"
            echo "🌐 Public URL: https://seodashboard.theprofitplatform.com.au"
          ENDSSH

      - name: Verify Cloudflare Tunnel
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.TPP_VPS_USER }}@${{ secrets.TPP_VPS_HOST }} << 'ENDSSH'
            echo "🔍 Verifying Cloudflare Tunnel status..."
            if systemctl is-active --quiet cloudflared; then
              echo "✅ Cloudflare Tunnel is running"
              sudo systemctl status cloudflared --no-pager -l | tail -20
            else
              echo "⚠️  Cloudflare Tunnel is not running!"
              echo "Starting Cloudflare Tunnel..."
              sudo systemctl start cloudflared
            fi
          ENDSSH

      - name: Get deployment info
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.TPP_VPS_USER }}@${{ secrets.TPP_VPS_HOST }} << 'ENDSSH'
            echo ""
            echo "════════════════════════════════════"
            echo "📊 DEPLOYMENT SUMMARY"
            echo "════════════════════════════════════"
            echo ""
            echo "🖥️  Service Status:"
            pm2 show seo-expert | grep -E "(status|uptime|memory|cpu)"
            echo ""
            echo "🌐 Endpoints:"
            echo "  • Internal: http://localhost:3000"
            echo "  • External: https://seodashboard.theprofitplatform.com.au"
            echo ""
            echo "🔗 Integration Status:"
            echo "  • SerpBear: http://localhost:3006"
            echo "  • SEO Analyst: http://localhost:5002"
            echo ""
            echo "════════════════════════════════════"
          ENDSSH

      - name: Notify deployment status
        if: always()
        run: |
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S UTC')
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT_SHA="${COMMIT_SHA:0:7}"

          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful at $TIMESTAMP"
            echo "📝 Commit: $COMMIT_MSG"
            echo "👤 Author: $COMMIT_AUTHOR"
            echo "🔗 SHA: $COMMIT_SHORT_SHA"

            # Optional: Send notification to Discord
            if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
              curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
                -H "Content-Type: application/json" \
                -d "{
                  \"embeds\": [{
                    \"title\": \"✅ SEO Expert Deployed Successfully\",
                    \"description\": \"Deployment to TPP VPS completed\",
                    \"color\": 3066993,
                    \"fields\": [
                      {\"name\": \"Commit\", \"value\": \"\`$COMMIT_SHORT_SHA\`\", \"inline\": true},
                      {\"name\": \"Author\", \"value\": \"$COMMIT_AUTHOR\", \"inline\": true},
                      {\"name\": \"Message\", \"value\": \"$COMMIT_MSG\", \"inline\": false},
                      {\"name\": \"URL\", \"value\": \"[seo-expert.theprofitplatform.com.au](https://seo-expert.theprofitplatform.com.au)\", \"inline\": false}
                    ],
                    \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                  }]
                }"
            fi
          else
            echo "❌ Deployment failed at $TIMESTAMP"
            echo "📝 Commit: $COMMIT_MSG"
            echo "👤 Author: $COMMIT_AUTHOR"
            echo "🔗 SHA: $COMMIT_SHORT_SHA"

            # Optional: Send failure notification
            if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
              curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
                -H "Content-Type: application/json" \
                -d "{
                  \"embeds\": [{
                    \"title\": \"❌ SEO Expert Deployment Failed\",
                    \"description\": \"Deployment to TPP VPS encountered errors\",
                    \"color\": 15158332,
                    \"fields\": [
                      {\"name\": \"Commit\", \"value\": \"\`$COMMIT_SHORT_SHA\`\", \"inline\": true},
                      {\"name\": \"Author\", \"value\": \"$COMMIT_AUTHOR\", \"inline\": true},
                      {\"name\": \"Message\", \"value\": \"$COMMIT_MSG\", \"inline\": false},
                      {\"name\": \"Logs\", \"value\": \"[View Action Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}
                    ],
                    \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                  }]
                }"
            fi
            exit 1
          fi

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TPP_VPS_SSH_KEY }}

      - name: Add TPP VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.TPP_VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback to previous backup
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.TPP_VPS_USER }}@${{ secrets.TPP_VPS_HOST }} << 'ENDSSH'
            set -e

            echo "⏮️  Starting rollback..."

            BACKUP_DIR=~/backups/seo-expert
            LATEST_BACKUP=$(ls -t $BACKUP_DIR/backup-*.tar.gz 2>/dev/null | head -1)

            if [ -z "$LATEST_BACKUP" ]; then
              echo "❌ No backup found to rollback to!"
              exit 1
            fi

            echo "📦 Rolling back to: $LATEST_BACKUP"

            cd ~/projects/seo-expert

            # Stop service
            pm2 stop seo-expert || true

            # Extract backup
            tar -xzf "$LATEST_BACKUP"

            # Reinstall dependencies
            npm ci --omit=dev --ignore-scripts

            # Restart service
            pm2 restart seo-expert

            # Wait and verify
            sleep 5
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ Rollback successful!"
              pm2 show seo-expert
            else
              echo "❌ Rollback failed - service not responding!"
              exit 1
            fi
          ENDSSH
