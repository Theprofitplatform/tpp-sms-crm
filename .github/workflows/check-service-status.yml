name: Check Service Status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - run: |
          ssh-keyscan -H 31.97.222.218 >> ~/.ssh/known_hosts
          ssh avi@31.97.222.218 << 'ENDSSH'
            echo "=== Docker containers status ==="
            docker ps -a --filter "name=keyword-tracker"

            echo ""
            echo "=== Dashboard container logs (last 30 lines) ==="
            docker logs keyword-tracker-dashboard --tail 30 2>&1 || echo "Dashboard container not running"

            echo ""
            echo "=== Cloudflared container logs (last 20 lines) ==="
            docker logs keyword-tracker-cloudflared --tail 20 2>&1 || echo "Cloudflared container not running"

            echo ""
            echo "=== Check if deploy.tar.gz exists ==="
            ls -lh /tmp/deploy.tar.gz 2>&1 || echo "No deploy.tar.gz found"

            echo ""
            echo "=== Current deployment directory ==="
            ls -la /home/avi/seo-automation/current/dashboard/dist/ 2>&1 | head -10 || echo "No current deployment"
          ENDSSH
