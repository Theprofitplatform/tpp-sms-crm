name: Check Dashboard Files

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - run: |
          ssh-keyscan -H 31.97.222.218 >> ~/.ssh/known_hosts
          ssh avi@31.97.222.218 << 'ENDSSH'
            echo "=== Checking dashboard/dist in container ==="
            docker exec keyword-tracker-dashboard ls -la /app/dashboard/dist/

            echo ""
            echo "=== Checking if index.html exists ==="
            docker exec keyword-tracker-dashboard cat /app/dashboard/dist/index.html 2>&1 | head -20

            echo ""
            echo "=== Checking assets ==="
            docker exec keyword-tracker-dashboard ls -la /app/dashboard/dist/assets/ 2>&1 | head -10
          ENDSSH
