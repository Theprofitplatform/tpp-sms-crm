<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Health Check - SEO Expert Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .status-badge {
            padding: 20px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .status-badge h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #333;
        }

        .status-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .status-healthy { color: #10b981; }
        .status-degraded { color: #f59e0b; }
        .status-unhealthy { color: #ef4444; }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            font-size: 14px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #6b7280;
        }

        .metric-value {
            font-weight: 600;
            color: #111827;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .service-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .service-card.critical {
            border-left: 4px solid #ef4444;
        }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .service-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .service-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-up {
            background: #d1fae5;
            color: #065f46;
        }

        .status-down {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-degraded {
            background: #fef3c7;
            color: #92400e;
        }

        .status-not_configured {
            background: #f3f4f6;
            color: #6b7280;
        }

        .service-details {
            font-size: 13px;
            color: #666;
        }

        .service-detail {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .last-updated {
            color: #6b7280;
            font-size: 12px;
            margin-left: auto;
        }

        .auto-refresh-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #667eea;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f4f6;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                🏥 System Health Monitor
            </h1>
            <p>Real-time monitoring for all services and infrastructure</p>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn btn-primary" onclick="loadHealth()">
                <span id="refresh-icon">🔄</span> Refresh Now
            </button>
            <div class="auto-refresh-toggle">
                <span>Auto-refresh (5s)</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="autoRefresh" checked onchange="toggleAutoRefresh()">
                    <span class="slider"></span>
                </label>
            </div>
            <span class="last-updated" id="lastUpdated"></span>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading health data...</p>
        </div>

        <!-- Content (hidden initially) -->
        <div id="content" style="display: none;">
            <!-- Overall Status -->
            <div class="status-badge">
                <h2>Overall System Status</h2>
                <div class="status-value" id="overallStatus">—</div>
                <div class="metrics">
                    <div class="metric">
                        <span class="metric-label">Environment</span>
                        <span class="metric-value" id="environment">—</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Version</span>
                        <span class="metric-value" id="version">—</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Uptime</span>
                        <span class="metric-value" id="uptime">—</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Check Duration</span>
                        <span class="metric-value" id="checkDuration">—</span>
                    </div>
                </div>
            </div>

            <!-- Services -->
            <h2 style="color: white; margin-bottom: 15px; font-size: 20px;">Services Status</h2>
            <div class="services-grid" id="servicesGrid"></div>

            <!-- System Metrics -->
            <div id="systemMetrics" style="display: none;">
                <h2 style="color: white; margin-bottom: 15px; font-size: 20px;">System Metrics</h2>
                <div class="services-grid">
                    <div class="service-card">
                        <div class="service-name">Memory Usage</div>
                        <div class="service-details" id="memoryDetails"></div>
                    </div>
                    <div class="service-card">
                        <div class="service-name">CPU Information</div>
                        <div class="service-details" id="cpuDetails"></div>
                    </div>
                    <div class="service-card">
                        <div class="service-name">Process Details</div>
                        <div class="service-details" id="processDetails"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        const API_URL = window.location.origin;

        function formatUptime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return `${days}d ${hours % 24}h`;
            if (hours > 0) return `${hours}h ${minutes % 60}m`;
            if (minutes > 0) return `${minutes}m`;
            return `${Math.floor(seconds)}s`;
        }

        function getStatusClass(status) {
            const statusMap = {
                'healthy': 'status-healthy',
                'degraded': 'status-degraded',
                'unhealthy': 'status-unhealthy',
                'up': 'status-up',
                'down': 'status-down',
                'not_configured': 'status-not_configured',
                'not_authenticated': 'status-not_configured',
                'expired': 'status-degraded'
            };
            return statusMap[status] || 'status-not_configured';
        }

        async function loadHealth() {
            const refreshIcon = document.getElementById('refresh-icon');
            refreshIcon.innerHTML = '<span class="spinner"></span>';

            try {
                const response = await fetch(`${API_URL}/api/v2/health`);
                const data = await response.json();

                // Update overall status
                document.getElementById('overallStatus').textContent = data.status.toUpperCase();
                document.getElementById('overallStatus').className = `status-value ${getStatusClass(data.status)}`;
                document.getElementById('environment').textContent = data.environment || '—';
                document.getElementById('version').textContent = data.version || '—';
                document.getElementById('uptime').textContent = data.uptime ? formatUptime(data.uptime) : '—';
                document.getElementById('checkDuration').textContent = data.checkDuration || '—';

                // Update services
                const servicesGrid = document.getElementById('servicesGrid');
                servicesGrid.innerHTML = '';

                if (data.services) {
                    Object.entries(data.services).forEach(([key, service]) => {
                        const card = document.createElement('div');
                        card.className = `service-card ${service.critical ? 'critical' : ''}`;

                        let detailsHtml = '';
                        if (service.latency) {
                            detailsHtml += `<div class="service-detail"><span>Latency:</span><span>${service.latency}</span></div>`;
                        }
                        if (service.port) {
                            detailsHtml += `<div class="service-detail"><span>Port:</span><span>${service.port}</span></div>`;
                        }
                        if (service.details) {
                            Object.entries(service.details).forEach(([k, v]) => {
                                const label = k.replace(/([A-Z])/g, ' $1').trim();
                                detailsHtml += `<div class="service-detail"><span>${label}:</span><span>${v}</span></div>`;
                            });
                        }

                        card.innerHTML = `
                            <div class="service-header">
                                <div class="service-name">${service.name || key}</div>
                                <span class="service-status ${getStatusClass(service.status)}">${service.status.replace('_', ' ')}</span>
                            </div>
                            ${service.critical ? '<div style="color: #ef4444; font-size: 12px; margin-bottom: 10px;">⚠️ CRITICAL SERVICE</div>' : ''}
                            <div class="service-details">${detailsHtml}</div>
                            ${service.error ? `<div class="error-message">${service.error}</div>` : ''}
                        `;

                        servicesGrid.appendChild(card);
                    });
                }

                // Update system metrics
                if (data.metrics) {
                    document.getElementById('systemMetrics').style.display = 'block';

                    if (data.metrics.memory) {
                        const mem = data.metrics.memory;
                        document.getElementById('memoryDetails').innerHTML = `
                            <div class="service-detail"><span>Process:</span><span>${mem.used} / ${mem.total} MB</span></div>
                            <div class="service-detail"><span>System:</span><span>${mem.percentUsed}% used</span></div>
                            <div class="service-detail"><span>Free:</span><span>${mem.systemFree} MB</span></div>
                        `;
                    }

                    if (data.metrics.cpu) {
                        const cpu = data.metrics.cpu;
                        document.getElementById('cpuDetails').innerHTML = `
                            <div class="service-detail"><span>Cores:</span><span>${cpu.cores}</span></div>
                            ${cpu.loadAverage ? `<div class="service-detail"><span>Load:</span><span>${cpu.loadAverage.join(', ')}</span></div>` : ''}
                        `;
                    }

                    if (data.metrics.process) {
                        const proc = data.metrics.process;
                        document.getElementById('processDetails').innerHTML = `
                            <div class="service-detail"><span>Uptime:</span><span>${formatUptime(proc.uptime)}</span></div>
                            <div class="service-detail"><span>PID:</span><span>${proc.pid}</span></div>
                            <div class="service-detail"><span>Node:</span><span>${proc.nodeVersion}</span></div>
                            <div class="service-detail"><span>Platform:</span><span>${proc.platform} ${proc.arch}</span></div>
                        `;
                    }
                }

                // Update last updated time
                document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

                // Show content, hide loading
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (error) {
                console.error('Error loading health data:', error);
                document.getElementById('loading').innerHTML = `
                    <div style="color: white;">
                        <h2 style="color: #ef4444;">⚠️ Error Loading Health Data</h2>
                        <p style="margin-top: 10px;">${error.message}</p>
                        <p style="margin-top: 10px; font-size: 14px;">Make sure the API server is running on port 4000</p>
                        <button class="btn btn-primary" onclick="loadHealth()" style="margin-top: 20px;">Retry</button>
                    </div>
                `;
            } finally {
                refreshIcon.textContent = '🔄';
            }
        }

        function toggleAutoRefresh() {
            const enabled = document.getElementById('autoRefresh').checked;

            if (enabled) {
                autoRefreshInterval = setInterval(loadHealth, 5000);
            } else {
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    autoRefreshInterval = null;
                }
            }
        }

        // Load on page load
        window.addEventListener('load', () => {
            loadHealth();
            toggleAutoRefresh();
        });
    </script>
</body>
</html>
